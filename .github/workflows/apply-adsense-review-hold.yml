name: Apply AdSense review hold

on:
  workflow_dispatch:
    inputs:
      confirmation:
        description: 'Type HOLD to confirm the temporary public noindex and ad hold.'
        required: true
        type: string

permissions:
  contents: write

jobs:
  hold:
    if: github.event.inputs.confirmation == 'HOLD'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Apply hold to current public output
        run: python scripts/apply_adsense_review_hold.py
      - name: Verify hold output
        run: |
          ! rg 'pagead2\.googlesyndication\.com|google-adsense-account' --glob '*.html'
          rg -q 'Disallow: /' robots.txt
          ! rg '<url>' sitemap.xml
          ! rg '<item>' rss.xml
      - name: Commit hold output
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add -- robots.txt sitemap.xml rss.xml ':(glob)**/*.html'
            git commit -m "Hold public indexing and AdSense for editorial review"
            git push
          else
            echo "Review hold already applied."
          fi
