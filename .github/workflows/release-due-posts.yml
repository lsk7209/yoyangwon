name: Release due blog posts

on:
  schedule:
    - cron: "0 */5 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install GSC dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install google-api-python-client google-auth
      - name: Refresh CMS public data
        run: |
          python scripts/fetch_cms_provider_data.py --state IL --county Sangamon
      - name: Generate due posts
        run: |
          python scripts/generate_blog.py --site-url https://caregos.com/
          python scripts/generate_sitemap.py --site-url https://caregos.com/
      - name: Validate public SEO output
        run: |
          python scripts/validate_article_quality.py
          python scripts/validate_bulk_tracking.py content/bulk-post-tracking.csv --threshold 90 --publish-ready
          python scripts/validate_cms_data.py
          python scripts/validate_public_seo.py
      - name: Commit generated public pages
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add blog rss.xml sitemap.xml styles/data.js content/cms
            git commit -m "Release due scheduled blog posts"
            git push
          else
            echo "No scheduled posts due."
          fi
      - name: Submit sitemap to Google Search Console
        env:
          GSC_TOKEN_JSON: ${{ secrets.GSC_TOKEN_JSON }}
          ADSENSE_OAUTH_CLIENT_JSON: ${{ secrets.ADSENSE_OAUTH_CLIENT_JSON }}
        run: |
          python scripts/gsc_submit_sitemap.py --site-url https://caregos.com/ --sitemap sitemap.xml --wait 5
